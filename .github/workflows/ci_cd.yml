name: HVAC RL — CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      run_training:
        description: "Run full training (slow)"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.10"
  MLFLOW_TRACKING_URI: mlruns

jobs:

  # ─────────────────────────────
  # 1. LINT
  # ─────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install flake8 black isort

      - name: Black check
        run: black --check .

      - name: isort check
        run: isort --check-only .

      - name: flake8 check
        run: flake8 . --max-line-length=120 --exclude=mlruns,__pycache__,.git,data

  # ─────────────────────────────
  # 2. TEST
  # ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov fastapi uvicorn httpx

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

  # ─────────────────────────────
  # 3. PREPROCESS
  # ─────────────────────────────
  preprocess:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run preprocessing
        run: python data/preprocess.py --rows 2000

  # ─────────────────────────────
  # 4. API SMOKE TEST
  # ─────────────────────────────
  api-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install fastapi uvicorn httpx

      - name: Start API
        run: uvicorn app:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'

  # ─────────────────────────────
  # 5. DOCKER
  # ─────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [api-test, preprocess]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sanjana0412
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sanjana0412/hvac-rl:latest
            ghcr.io/sanjana0412/hvac-rl:v1.0.${{ github.run_number }}
            ghcr.io/sanjana0412/hvac-rl:${{ github.sha }}

  # ─────────────────────────────
  # 6. RETRAIN
  # ─────────────────────────────
  retrain:
    runs-on: ubuntu-latest
    needs: preprocess

    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.run_training == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt